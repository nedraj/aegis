# Local development stack for Mission Control + Ollama (no GPU required)
# Usage:
#   cd examples
#   docker compose -f docker-compose.local.yml up --build
# Then: curl -X POST http://localhost:8080/query -d '{"prompt":"Give me a one-sentence status of the comms array."}'

version: "3.8"
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # On first run it will download phi3:mini (~2.2GB). Subsequent runs are instant.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mission-control:
    build:
      context: ../mission-control
      dockerfile: Dockerfile
    container_name: mission-control-dev
    ports:
      - "8080:8080"
    environment:
      # Phase 5 pluggable inference — these are the preferred variables
      INFERENCE_ENGINE: ollama
      INFERENCE_URL: http://ollama:11434
      # Legacy fallbacks (still supported by app.py)
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: phi3:mini

      # To experiment with vLLM locally (CPU, very slow, needs huggingface_hub + model snapshot):
      # 1. docker run -v $PWD/staging/models:/models -p 8000:8000 vllm/vllm-openai:latest \
      #      --model /models/phi-3-mini-4k-instruct --served-model-name phi-3-mini-4k-instruct --trust-remote-code
      # 2. Set INFERENCE_ENGINE=vllm and INFERENCE_URL=http://host.docker.internal:8000 (or use a vllm service in this compose)
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
